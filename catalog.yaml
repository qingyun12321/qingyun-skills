updated_at: 2026-04-05

layout:
  repo_root_marker_files:
    - catalog.yaml
    - skills
  active_symlink:
    path: ~/.agents/skills
    target_from_repo_root: skills
    command_template: ln -sfn "$REPO_ROOT/skills" "$HOME/.agents/skills"

maintenance:
  environment_managers:
    runtime_and_global_cli: mise
    python_packages_and_tools: uv
  source_inventory_policy:
    remove_unused_sources: true
    notes:
      - every source entry must be referenced by at least one skill
      - if the last skill moves away from a source, remove that source entry in the same maintenance change
  sudo_policy:
    apt_commands_require_user_execution: true
    agent_responsibility:
      - keep the apt package inventory accurate
      - compute which apt packages are still referenced
      - generate the exact sudo command for the user to run
    notes:
      - agents should not assume they can execute privileged apt install or apt remove commands themselves
  python_strategy:
    default: use the system default Python
    package_install_mode: uv pip install --system
    tool_install_mode: uv tool install
    fallback_when_system_python_missing:
      - uv python install 3.12
      - use --python 3.12 only for the fallback case
  environment_files:
    mise: mise.toml
    uv: uv-requirements.txt
  dependency_reference_rules:
    depends_on: required shared environment or host prerequisite
    optional_depends_on: helpful for expanded workflows but not required for the narrowest happy path
  sync_policy:
    preferred_copy_command: rsync -a
    delete_local_extras_by_default: false
    preserve_local_artifacts:
      - node_modules committed or bootstrapped inside a skill directory
      - local package.json or bun.lock files added for one-off helper scripts
      - Codex-specific wording changes kept intentionally in local skill copies
    explanation: >-
      This defines how upstream skill folders are copied into the local mirror. The
      default policy is copy-forward without deleting local extras, because some
      skills intentionally keep local bootstrap artifacts or tiny local adaptations.
  uninstall_policy:
    remove_shared_environment_only_when_unreferenced: true
    remove_skill_specific_state_by_default: true
    notes:
      - do not remove a shared environment until no skill references it
      - when uninstalling a skill, remove its skill-specific user data and local state by default
      - only keep skill-generated user data if the uninstall task explicitly asks to preserve it

cleanup_profiles:
  none:
    summary: no known extra cleanup outside the skill directory
  baoyu-user-config:
    summary: per-skill baoyu preferences and prompts
    candidate_paths:
      - ~/.baoyu-skills/<skill-name>
      - $XDG_CONFIG_HOME/baoyu-skills/<skill-name>
    removal_rule: remove by default when uninstalling that specific skill
  self-improvement-project-state:
    summary: project learning logs created by actual usage
    candidate_paths:
      - .learnings/
    removal_rule: remove by default when uninstalling the self-improvement skill, unless preservation is explicitly requested

