  - local wrapper around npm package beautiful-mermaid@1.1.3
  - upstream .agents/skills/editor.md is for maintaining the upstream live editor and is not mirrored here
  - package has no npm bin, so use scripts/render.mjs instead of mise/npm:beautiful-mermaid
  type: local_wrapper
